<!DOCTYPE html>
<html>
<head>
  <title>IoT Image Control</title>
</head>
<body>

<h2>Upload Gambar</h2>
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>

<p id="status"></p>

<h3>Gallery</h3>
<div id="gallery"></div>

<script>
const API_KEY = "b8cfebb199389c2fe459a736e3bd4484";
const BIN_ID = "69eef0e636566621a8f672b2";
const JSON_KEY = "ISI_JSONBIN_KEY_KAMU";

const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

// ================= LOAD DATA =================
async function loadImages() {
  try {
    const res = await fetch(BIN_URL);
    const data = await res.json();

    let record = data.record;

    if (!record || !record.images) {
      record = { current: "", images: [] };
      await save(record);
    }

    displayImages(record.images, record.current);
  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Gagal load data!";
  }
}

// ================= TAMPILKAN =================
function displayImages(images, current) {
  const container = document.getElementById("gallery");
  container.innerHTML = "";

  if (images.length === 0) {
    container.innerHTML = "<p>Belum ada gambar</p>";
    return;
  }

  images.forEach((url, index) => {
    if (!url) return; // skip kosong

    const div = document.createElement("div");

    div.innerHTML = `
      <img src="${url}" width="120"><br>
      ${url === current ? "<b style='color:green'>AKTIF</b><br>" : ""}
      <button onclick="setCurrent('${url}')">Tampilkan</button>
      <button onclick="deleteImage(${index})">Delete</button>
      <hr>
    `;

    container.appendChild(div);
  });
}

// ================= UPLOAD =================
async function upload() {
  const file = document.getElementById("fileInput").files[0];
  const status = document.getElementById("status");

  if (!file) {
    alert("Pilih file!");
    return;
  }

  status.innerText = "Uploading...";

  const reader = new FileReader();
  reader.readAsDataURL(file);

  reader.onload = async () => {
    try {
      const base64 = reader.result.split(',')[1];

      const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
        method: "POST",
        body: new URLSearchParams({ image: base64 })
      });

      const data = await res.json();
      console.log("ImgBB response:", data);

      if (!data.success) {
        status.innerText = "Upload gagal!";
        return;
      }

      const imageUrl = data.data.url;

      status.innerText = "Menyimpan ke database...";

      await addImage(imageUrl);

      status.innerText = "Upload berhasil!";
      document.getElementById("fileInput").value = "";

      loadImages();

    } catch (err) {
      console.error(err);
      status.innerText = "Terjadi error!";
    }
  };
}

// ================= TAMBAH IMAGE =================
async function addImage(url) {
  const res = await fetch(BIN_URL);
  const data = await res.json();
  const record = data.record;

  record.images.push(url);

  if (!record.current) {
    record.current = url;
  }

  await save(record);
}

// ================= SET AKTIF =================
async function setCurrent(url) {
  const status = document.getElementById("status");
  status.innerText = "Mengupdate tampilan...";

  const res = await fetch(BIN_URL);
  const data = await res.json();
  const record = data.record;

  record.current = url;

  await save(record);

  status.innerText = "Berhasil diupdate!";
  loadImages();
}

// ================= DELETE =================
async function deleteImage(index) {
  const status = document.getElementById("status");
  status.innerText = "Menghapus gambar...";

  const res = await fetch(BIN_URL);
  const data = await res.json();
  const record = data.record;

  const deletedUrl = record.images[index];

  record.images.splice(index, 1);

  if (record.current === deletedUrl) {
    record.current = record.images[0] || "";
  }

  await save(record);

  status.innerText = "Gambar dihapus!";
  loadImages();
}

// ================= SAVE =================
async function save(record) {
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": JSON_KEY
    },
    body: JSON.stringify(record)
  });
}

// ================= INIT =================
window.onload = loadImages;
</script>

</body>
</html>
